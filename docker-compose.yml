services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: final
    expose:
      - "3001"
    deploy:
      replicas: 1
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/srv/Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
